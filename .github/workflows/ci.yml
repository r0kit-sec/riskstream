name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CISA_KEV_IMAGE_NAME: ghcr.io/itsbriany/cisa-kev-ingestion
  THREATFOX_IMAGE_NAME: ghcr.io/itsbriany/threatfox-ingestion
  URLHAUS_IMAGE_NAME: ghcr.io/itsbriany/urlhaus-ingestion
  THREAT_SIGNAL_NORMALIZER_IMAGE_NAME: ghcr.io/itsbriany/threat-signal-normalizer

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest

      - name: Lint with ruff
        run: ruff check ./app

      - name: Format check with black
        run: black --check ./app

      - name: Run tests
        run: pytest ./app --tb=short || true

      - name: Run ThreatFox unit tests in service base image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            python:3.11-slim \
            sh -lc "python -m pip install --quiet pytest && pytest -q riskstream/tests/unit/test_threatfox_ingestion.py"

      - name: Run CISA KEV unit tests in service base image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            python:3.11-slim \
            sh -lc "python -m pip install --quiet pytest && pytest -q riskstream/tests/unit/test_cisa_kev_ingestion.py"

      - name: Run URLhaus unit tests in service base image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            python:3.11-slim \
            sh -lc "python -m pip install --quiet pytest && pytest -q riskstream/tests/unit/test_urlhaus_ingestion.py"

      - name: Run threat-signal normalizer unit tests in service base image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            python:3.11-slim \
            sh -lc "python -m pip install --quiet pytest minio && pytest -q riskstream/tests/unit/test_threat_signal_normalizer.py"

  container:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (PR) / Build and push (main)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=riskstream
          cache-to: type=gha,mode=max,scope=riskstream,ignore-error=true

      - name: ThreatFox Docker metadata
        id: threatfox-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.THREATFOX_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build ThreatFox (PR) / Build and push ThreatFox (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./riskstream/services/ingestion/threatfox/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.threatfox-meta.outputs.tags }}
          labels: ${{ steps.threatfox-meta.outputs.labels }}
          cache-from: type=gha,scope=threatfox-ingestion
          cache-to: type=gha,mode=max,scope=threatfox-ingestion,ignore-error=true

      - name: CISA KEV Docker metadata
        id: cisa-kev-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CISA_KEV_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build CISA KEV (PR) / Build and push CISA KEV (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./riskstream/services/ingestion/cisa-kev/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.cisa-kev-meta.outputs.tags }}
          labels: ${{ steps.cisa-kev-meta.outputs.labels }}
          cache-from: type=gha,scope=cisa-kev-ingestion
          cache-to: type=gha,mode=max,scope=cisa-kev-ingestion,ignore-error=true

      - name: URLhaus Docker metadata
        id: urlhaus-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.URLHAUS_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build URLhaus (PR) / Build and push URLhaus (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./riskstream/services/ingestion/urlhaus/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.urlhaus-meta.outputs.tags }}
          labels: ${{ steps.urlhaus-meta.outputs.labels }}
          cache-from: type=gha,scope=urlhaus-ingestion
          cache-to: type=gha,mode=max,scope=urlhaus-ingestion,ignore-error=true

      - name: Threat signal normalizer Docker metadata
        id: threat-signal-normalizer-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.THREAT_SIGNAL_NORMALIZER_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build threat signal normalizer (PR) / Build and push threat signal normalizer (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./riskstream/services/normalization/threat-signal/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.threat-signal-normalizer-meta.outputs.tags }}
          labels: ${{ steps.threat-signal-normalizer-meta.outputs.labels }}
          cache-from: type=gha,scope=threat-signal-normalizer
          cache-to: type=gha,mode=max,scope=threat-signal-normalizer,ignore-error=true
