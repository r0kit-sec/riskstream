apiVersion: apps/v1
kind: Deployment
metadata:
  name: riskstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: riskstream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: riskstream
    spec:
      containers:
        - name: riskstream
          image: ghcr.io/r0kit-sec/riskstream:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20