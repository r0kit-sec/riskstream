apiVersion: batch/v1
kind: CronJob
metadata:
  name: urlhaus-archive-lifecycle
spec:
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: urlhaus-archive-lifecycle
        spec:
          restartPolicy: OnFailure
          containers:
            - name: archive-lifecycle
              image: ghcr.io/itsbriany/urlhaus-ingestion:main
              imagePullPolicy: IfNotPresent
              command:
                - python
                - riskstream/services/ingestion/urlhaus/src/archive_main.py
              env:
                - name: ENVIRONMENT
                  value: "production"
                - name: URLHAUS_HOT_RETENTION_DAYS
                  value: "30"
                - name: URLHAUS_ARCHIVE_RETENTION_DAYS
                  value: "180"
                - name: S3_ENDPOINT
                  value: "minio:9000"
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
                - name: S3_USE_SSL
                  value: "false"
