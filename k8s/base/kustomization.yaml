apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - minio-deployment.yaml
  - minio-service.yaml
  - minio-init-job.yaml
  - threatfox-ingestion-deployment.yaml
  - threatfox-ingestion-service.yaml

configMapGenerator:
  - name: minio-init-scripts
    files:
      - init-minio-buckets.sh=scripts/init-minio-buckets.sh

commonLabels:
  app.kubernetes.io/name: riskstream