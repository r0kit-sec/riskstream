apiVersion: apps/v1
kind: Deployment
metadata:
  name: cisa-kev-ingestion
  labels:
    app: cisa-kev-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cisa-kev-ingestion
  template:
    metadata:
      labels:
        app: cisa-kev-ingestion
    spec:
      containers:
        - name: cisa-kev-ingestion
          image: ghcr.io/itsbriany/cisa-kev-ingestion:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: ENVIRONMENT
              value: "production"
            - name: CISA_KEV_URL
              value: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
            - name: S3_ENDPOINT
              value: "minio:9000"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: S3_USE_SSL
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
