apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: riskstream-staging
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: riskstream=ghcr.io/r0kit-sec/riskstream
    argocd-image-updater.argoproj.io/riskstream.update-strategy: latest
    argocd-image-updater.argoproj.io/riskstream.pull-secret: ghcr-secret
spec:
  project: riskstream
  source:
    repoURL: https://github.com/r0kit-sec/riskstream.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true