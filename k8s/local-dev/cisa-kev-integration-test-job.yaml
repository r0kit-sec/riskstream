apiVersion: batch/v1
kind: Job
metadata:
  name: cisa-kev-integration-test
  namespace: local-dev
  labels:
    app: cisa-kev-integration-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: cisa-kev-integration-test
    spec:
      restartPolicy: Never
      containers:
        - name: pytest
          image: python:3.12-slim
          env:
            - name: CISA_KEV_BASE_URL
              value: http://cisa-kev-ingestion
          command:
            - /bin/sh
            - -c
            - pip install --no-cache-dir pytest && pytest -v /tests/test_cisa_kev_ingestion.py
          volumeMounts:
            - name: test-file
              mountPath: /tests
              readOnly: true
      volumes:
        - name: test-file
          configMap:
            name: cisa-kev-integration-test-code
